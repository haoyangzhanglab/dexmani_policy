# @package _global_

defaults:
  - maniflow

# DDP 训练配置
# - training.num_gpus: 使用的 GPU 数量
# - training.gpu_ids: 指定使用哪几张 GPU（null 表示使用前 num_gpus 张卡）
# - dataloader.batch_size: 每张卡的 batch size（不是总 batch size）
#   * 总 batch size = batch_size × num_gpus
#   * 例如：batch_size=32, num_gpus=4 → 总 batch=128

policy_name: maniflow_ddp

training:
  num_gpus: 4
  gpu_ids: [0, 1, 2, 3]  # 指定使用哪几张GPU，null表示使用前num_gpus张卡
  device: cuda:0

dataloader:
  batch_size: 32  # 每张卡的 batch size（总 batch = 32 × 4 = 128）
  num_workers: 4  # 每张卡的 worker 数

val_dataloader:
  batch_size: 32
  num_workers: 4

hydra:
  job:
    override_dirname: ${policy_name}_${task_name}
  run:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d}_${now:%H-%M}_${training.seed}
  sweep:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d}_${now:%H-%M}_${training.seed}
    subdir: ${hydra.job.num}
