# @package _global_

defaults:
  - dataset: multi_task_pc
  - _self_

policy_name: multi_task_dp3

task_name: multi_task
seed: 42

horizon: 16
n_obs_steps: 2
n_action_steps: 8
action_dim: 19


dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: true

val_dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: false


# ------------------------------------------------------------------ #
# Agent: MultiTaskAgent 包装 DP3Agent
# 使用 FiLM 调制注入任务条件，兼容所有 backbone
# base_agent 使用与 dp3.yaml 一致的扁平参数风格
# ------------------------------------------------------------------ #
agent:
  _target_: dexmani_policy.agents.core.multi_task.MultiTaskAgent
  num_tasks: 3
  task_embedding_dim: 64
  task_dropout: 0.1
  # 显式指定 obs_cond_dim 以避免初始化时的推断开销
  # DP3ObsEncoder: pc_out_dim (128) + state_out_dim (64) = 192
  # 如果 condition_type='film'，则 reshape 为 (B, n_obs_steps * 192) = (B, 384)
  obs_cond_dim: 384  # n_obs_steps (2) * (pc_out_dim (128) + state_out_dim (64))
  base_agent:
    _target_: dexmani_policy.agents.core.dp3.DP3Agent
    horizon: ${horizon}
    n_obs_steps: ${n_obs_steps}
    n_action_steps: ${n_action_steps}
    action_dim: ${action_dim}

    encoder_type: idp3
    pc_dim: 3
    pc_out_dim: 128
    state_dim: 19
    num_points: 1024

    diffusion_step_embed_dim: 128
    down_dims: [256, 512, 1024]
    kernel_size: 5
    n_groups: 8
    condition_type: film

    num_training_steps: 100
    num_inference_steps: 10
    prediction_type: sample


optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-6
  obs_lr: 1.0e-4
  obs_weight_decay: 1.0e-6
  betas: [0.95, 0.999]


ema:
  _target_: dexmani_policy.training.common.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999


workspace:
  _target_: dexmani_policy.training.common.workspace.TrainWorkspace
  output_dir: ${hydra:runtime.output_dir}

  wandb_cfg:
    _target_: dexmani_policy.training.common.workspace.WandbConfig
    project: dexmani_policy
    group: ${policy_name}
    name: ${task_name}_${now:%Y-%m-%d_%H-%M}_${training.seed}
    id: null
    resume: allow
    mode: offline
    video_fps: 10

  checkpoint_cfg:
    _target_: dexmani_policy.training.common.workspace.CheckpointConfig
    monitor_key: test_mean_score
    mode: max
    topk: 3


training:
  seed: ${seed}
  device: cuda:0
  use_ema: true
  use_ema_teacher_for_consistency: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  loop:
    num_epochs: 1000
    log_interval_steps: 50
    val_interval_epochs: 25
    eval_interval_epochs: 250
    sample_interval_epochs: 5
    gradient_accumulate_every: 1
    grad_clip_norm: 1.0


# 多任务评估 runner（按任务分别评估）
# 启用时取消注释并替换 task_configs 中的 task_name 为实际任务名
env_runner:
  _target_: dexmani_policy.env_runner.multi_task_sim_runner.MultiTaskSimRunner
  n_obs_steps: ${n_obs_steps}
  env_video_fps: 10
  default_eval_episodes: 20
  sensor_modalities: ['joint_state', 'point_cloud']
  task_configs:
    - task_name: task_1
      task_id: 0
    - task_name: task_2
      task_id: 1
    - task_name: task_3
      task_id: 2


eval:
  seed: ${seed}
  sim:
    ckpt_tag_or_path: best
    eval_episodes: 100
    denoise_timesteps_list: [10]
    use_ema_for_eval: true


hydra:
  job:
    override_dirname: ${policy_name}_${task_name}
  run:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
  sweep:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
    subdir: ${hydra.job.num}
