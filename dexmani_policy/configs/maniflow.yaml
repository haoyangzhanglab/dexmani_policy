policy_name: maniflow

task_name: pick_apple_messy
zarr_path: robot_data/${task_name}.zarr

seed: 42

horizon: 16
n_obs_steps: 2
n_action_steps: 8

action_key: action  # action | action_ee
action_dim: ${eval:'21 if ${eq:${action_key},action_ee} else 19'}

dataloader:
  batch_size: 64
  shuffle: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  drop_last: false  # DDP 建议开启，防最后 batch 大小不均导致 all_reduce 失败

val_dataloader:
  batch_size: 64
  shuffle: false
  num_workers: 4
  pin_memory: true
  persistent_workers: false
  drop_last: false

dataset:
  _target_: dexmani_policy.datasets.pc_dataset.PCDataset
  action_key: ${action_key}
  zarr_path: ${zarr_path}
  seed: ${training.seed}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps} - 1'}
  pad_after: ${eval:'${n_action_steps} - 1'}
  val_ratio: 0.05
  max_train_episodes: null
  sensor_modalities: ["joint_state", "point_cloud"]

  # ---- data augmentation (add under dataset, uncomment to enable) ----
  # augmentation_cfg:
  #   pc:
  #     color:
  #       brightness: 0.2
  #       contrast: 0.2
  #       saturation: 0.3
  #       hue: 0.05
  #       prob: 0.8
  #     spatial:
  #       rot_z: 15.0
  #       trans_xy: 0.10
  #       scale: 1.02
  #       prob: 0.8
  #     dropout:
  #       dropout_ratio: 0.1
  #       prob: 0.5
  #   state:
  #     noise_std: 0.005
  #     prob: 0.5

agent:
  _target_: dexmani_policy.agents.core.maniflow.ManiFlowAgent
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  action_dim: ${action_dim}

  encoder_type: pointpn  # pointpn | pointnext_tokenizer
  pc_dim: 3
  state_dim: 19
  num_points: 1024

  pc_encoder_config:
    embed_channels: 48
    stage_radii: [0.04, 0.08, 0.16]
    stage_num_neighbors: [16, 16, 14]
    stage_lga_blocks: [1, 1, 1]
    stage_channel_expansion: [2, 2, 2]
    point_cloud_type: scan

  n_layers: 12
  hidden_dim: 768
  n_head: 8
  mlp_ratio: 4.0
  p_drop_attn: 0.1
  qkv_bias: true
  qk_norm: true
  pre_norm_modality: false
  use_compile: false

  timestep_embed_dim: 128
  target_t_embed_dim: 128

  denoise_timesteps: 10
  flow_batch_ratio: 0.75
  t_sample_mode_for_flow: beta
  t_sample_mode_for_consistency: discrete
  dt_sample_mode_for_consistency: uniform
  target_t_sample_mode: relative  # 需配合 use_ema_teacher_for_consistency=true，consistency 训练提供 target_t 泛化；纯 flow 模式下 target_t 恒为 0，推理时 dt>0 存在分布偏移
  modality_dropout_probs:
    joint_state: 0.2

optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-3
  obs_lr: 1.0e-4
  obs_weight_decay: 1.0e-6
  betas: [0.9, 0.95]

ema:
  _target_: dexmani_policy.training.common.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

workspace:
  _target_: dexmani_policy.training.common.workspace.TrainWorkspace
  output_dir: ${hydra:runtime.output_dir}

  wandb_cfg:
    _target_: dexmani_policy.training.common.workspace.WandbConfig
    project: dexmani_policy
    group: ${policy_name}
    name: ${task_name}_${now:%Y-%m-%d_%H-%M}_${training.seed}
    id: ${policy_name}_${task_name}_${training.seed}
    resume: allow
    mode: offline
    video_fps: ${env_runner.env_video_fps}

  checkpoint_cfg:
    _target_: dexmani_policy.training.common.workspace.CheckpointConfig
    monitor_key: test_mean_score
    mode: max
    topk: 3

training:
  seed: ${seed}
  device: cuda:0
  use_ema: true
  use_ema_teacher_for_consistency: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_grad_norm: 1.0
  use_bfloat16: true
  loop:
    num_epochs: 1000
    log_interval_steps: 50
    val_interval_epochs: 25
    eval_interval_epochs: 200
    sample_interval_epochs: 5


env_runner:
  _target_: dexmani_policy.env_runner.sim_runner.SimRunner
  task_name: ${task_name}
  n_obs_steps: ${n_obs_steps}
  env_video_fps: 10
  default_eval_episodes: 20
  sensor_modalities: ${dataset.sensor_modalities}
  env_kwargs:
    control_mode: ${eval:'"ee" if ${eq:${action_key},action_ee} else "joint"'}

# ---- offline eval (eval_sim.py)
eval:
  seed: 0
  offline:
    ckpt_tag_or_path: best
    eval_episodes: 100
    denoise_timesteps_list: [10]
    use_ema_for_eval: true

hydra:
  job:
    override_dirname: ${policy_name}_${task_name}
  run:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
  sweep:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
    subdir: ${hydra.job.num}
