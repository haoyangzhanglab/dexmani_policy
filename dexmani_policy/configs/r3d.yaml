# R3D — 3D Diffusion Policy with Uni3D encoder
# Encoder:  Uni3D (ViT-tiny, 256d, pre-trained) with color point cloud
# Decoder:  OneWayTransformer (cross-attention) + DDIM
# Modality: point_cloud(6d, xyz+rgb) + joint_state → action
# Note:     pc_dim=6 (color), use_compile=true (OneWayTransformer backbone only)

policy_name: r3d

# ── Task ──
task_name: pick_apple_messy
zarr_path: robot_data/${task_name}.zarr

# ── Core ──
seed: 42
horizon: 16
n_obs_steps: 2
n_action_steps: 8
action_key: action                    # action | action_ee
action_dim: ${eval:'21 if ${eq:${action_key},action_ee} else 19'}

# ── Dataloader ──
# NOTE: R3D ViT encoder is memory-intensive (512 patch tokens × N samples).
# Single-GPU: batch_size=48 tested on 24 GB (15.7 GB peak).
# DDP across 4+ GPUs can use larger batches.
dataloader:
  batch_size: 48
  shuffle: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: false

val_dataloader:
  batch_size: 8
  shuffle: false
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  drop_last: false

# ── Dataset ──
dataset:
  _target_: dexmani_policy.datasets.pc_dataset.PCDataset
  action_key: ${action_key}
  zarr_path: ${zarr_path}
  seed: ${training.seed}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps} - 1'}
  pad_after: ${eval:'${n_action_steps} - 1'}
  val_ratio: 0.05
  max_train_episodes: null
  sensor_modalities: ["joint_state", "point_cloud"]
  obs_horizon: ${n_obs_steps}

  # ⚠️ PC augmentation defaults — synced across all PC-based policy configs.
  # R3D data augmentation (paper Section 3.2)
  # See AUGMENTOR_REGISTRY in base_dataset.py for supported keys.
  augmentation_cfg:
    pc:
      coord_noise: {noise_std: 0.002, ratio: 0.3, prob: 0.5}
      dropout:     {dropout_ratio: 0.1, prob: 0.3}
      color:       {brightness: 0.3, contrast: 0.4, saturation: 0.5, hue: 0.08, prob: 0.2}
      color_noise: {noise_std: 0.01, prob: 0.2}
    state:
      noise:       {noise_std: 0.005, prob: 0.5}

# ── Agent ──
agent:
  _target_: dexmani_policy.agents.core.r3d.R3DAgent
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  action_dim: ${action_dim}

  # Uni3D encoder
  pc_dim: 6
  num_points: 1024
  state_dim: ${action_dim}
  state_out_dim: 64

  pc_encoder_config:
    pc_model: eva02_tiny_patch14_224
    embed_dim: 256
    num_group: 512
    group_size: 32
    pc_in_channels: 6
    patch_dropout: 0.0
    drop_path_rate: 0.0
    feature_mode: pointsam
    use_pretrained_weights: true
    pretrained_weights_path: data/pretrained/uni3d

  fps_random_config:
    use_random: true
    random_start: true
    random_noise_scale: 0.0
    shuffle_output: true

  # OneWayTransformer backbone
  timestep_embed_dim: 128
  embedding_dim: 256
  depth: 4
  num_heads: 8
  mlp_dim: 2048
  attention_downsample_rate: 2

  modality_dropout_probs:
    joint_state: 0.2

  # Diffusion
  num_training_steps: 100
  num_inference_steps: 10
  prediction_type: sample

# ── Optimizer ──
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-6
  betas: [0.95, 0.999]
  obs_lr: 1.0e-4
  obs_weight_decay: 1.0e-6

# ⚠️ Synced across all policy configs — update all when changing.
# ── EMA ──
ema:
  _target_: dexmani_policy.training.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# ── Training ──
training:
  seed: ${seed}
  device: cuda:0
  use_bfloat16: true
  use_compile: true                # compile_backbone() compiles OneWayTransformer only, not ViT
  use_ema: true
  use_ema_teacher_for_consistency: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_grad_norm: 1.0
  loop:
    num_epochs: 1000
    log_interval_steps: 50
    val_interval_epochs: 25
    eval_interval_epochs: 250
    sample_interval_epochs: 5
    gradient_accumulation_steps: 1

# ⚠️ Synced across all policy configs — update all when changing.
# ── Workspace ──
workspace:
  _target_: dexmani_policy.training.workspace.TrainWorkspace
  output_dir: ${hydra:runtime.output_dir}

  wandb_cfg:
    _target_: dexmani_policy.training.workspace.WandbConfig
    project: dexmani_policy
    group: ${policy_name}
    name: ${task_name}_${now:%Y-%m-%d_%H-%M}_${training.seed}
    id: ${policy_name}_${task_name}_${training.seed}
    resume: allow
    mode: offline
    video_fps: ${env_runner.env_video_fps}

  checkpoint_cfg:
    _target_: dexmani_policy.training.workspace.CheckpointConfig
    monitor_key: test_mean_score
    mode: max
    topk: 3

# ── Env Runner ──
env_runner:
  _target_: dexmani_policy.env_runner.sim_runner.SimRunner
  task_name: ${task_name}
  n_obs_steps: ${n_obs_steps}
  env_video_fps: 15
  default_eval_episodes: 25
  sensor_modalities: ${dataset.sensor_modalities}
  env_kwargs:
    control_mode: ${eval:'"ee" if ${eq:${action_key},action_ee} else "joint"'}

# ⚠️ Synced across all policy configs — update all when changing.
# ── Eval ──
eval:
  seed: 0
  offline:
    ckpt_tag_or_path: best
    eval_episodes: 100
    denoise_timesteps_list: [10]
    use_ema_for_eval: true

# ── Hydra ──
hydra:
  job:
    override_dirname: ${policy_name}_${task_name}
  run:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
  sweep:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
    subdir: ${hydra.job.num}
