# DP3 — 3D Diffusion Policy with point cloud observation
# Encoder:  iDP3 / PointNeXT point cloud encoder (128d)
# Decoder:  ConditionalUnet1D (FiLM conditioning) + DDIM
# Modality: point_cloud(6d, xyz+rgb) + joint_state → action

policy_name: dp3

# ── Task ──
task_name: pick_apple_messy
zarr_path: robot_data/${task_name}.zarr

# ── Core ──
seed: 42
horizon: 16
n_obs_steps: 2
n_action_steps: 8
action_key: action                    # action | action_ee
action_dim: ${eval:'21 if ${eq:${action_key},action_ee} else 19'}

# ── Dataloader ──
dataloader:
  batch_size: 256
  shuffle: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: false

val_dataloader:
  batch_size: 256
  shuffle: false
  num_workers: 4
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  drop_last: false

# ── Dataset ──
dataset:
  _target_: dexmani_policy.datasets.pc_dataset.PCDataset
  action_key: ${action_key}
  zarr_path: ${zarr_path}
  seed: ${training.seed}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps} - 1'}
  pad_after: ${eval:'${n_action_steps} - 1'}
  val_ratio: 0.05
  max_train_episodes: null
  sensor_modalities: ["joint_state", "point_cloud"]
  obs_horizon: ${n_obs_steps}

  # ⚠️ PC augmentation defaults — synced across all PC-based policy configs.
  # See AUGMENTOR_REGISTRY in base_dataset.py for supported keys.
  augmentation_cfg:
    pc:
      coord_noise: {noise_std: 0.002, ratio: 0.3, prob: 0.5}
      dropout:     {dropout_ratio: 0.1, prob: 0.3}
      color:       {brightness: 0.3, contrast: 0.4, saturation: 0.5, hue: 0.08, prob: 0.2}
      color_noise: {noise_std: 0.01, prob: 0.2}
    state:
      noise:       {noise_std: 0.005, prob: 0.5}

# ── Agent ──
agent:
  _target_: dexmani_policy.agents.core.dp3.DP3Agent
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  action_dim: ${action_dim}

  encoder_type: idp3                 # idp3 | pointnext | dp3
  pc_dim: 6
  pc_out_dim: 128
  state_dim: 19
  num_points: 1024

  fps_random_config:
    use_random: true
    random_start: true
    random_noise_scale: 0.0
    shuffle_output: true

  # Diffusion backbone
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

  num_training_steps: 100
  num_inference_steps: 10
  prediction_type: sample

  modality_dropout_probs:
    joint_state: 0.2

# ── Optimizer ──
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-6
  betas: [0.95, 0.999]
  obs_lr: 1.0e-4
  obs_weight_decay: 1.0e-6

# ── EMA ──
ema:
  _target_: dexmani_policy.training.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# ── Training ──
training:
  seed: ${seed}
  device: cuda:0
  use_bfloat16: true
  use_compile: true
  use_ema: true
  use_ema_teacher_for_consistency: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_grad_norm: 1.0
  loop:
    num_epochs: 1000
    log_interval_steps: 50
    val_interval_epochs: 25
    eval_interval_epochs: 250
    sample_interval_epochs: 5
    gradient_accumulation_steps: 1

# ── Workspace ──
workspace:
  _target_: dexmani_policy.training.workspace.TrainWorkspace
  output_dir: ${hydra:runtime.output_dir}

  wandb_cfg:
    _target_: dexmani_policy.training.workspace.WandbConfig
    project: dexmani_policy
    group: ${policy_name}
    name: ${task_name}_${now:%Y-%m-%d_%H-%M}_${training.seed}
    id: ${policy_name}_${task_name}_${training.seed}
    resume: allow
    mode: offline
    video_fps: 15  # decoupled from env_runner; default matches frame_skip(16)/time_step(1/240)

  checkpoint_cfg:
    _target_: dexmani_policy.training.workspace.CheckpointConfig
    monitor_key: test_mean_score
    mode: max
    topk: 3

# ── Env Runner ──
env_runner:
  _target_: dexmani_policy.env_runner.sim_runner.SimRunner
  task_name: ${task_name}
  n_obs_steps: ${n_obs_steps}
  default_eval_episodes: 25        # PC-based policies: 25; RGB-based: 20
  sensor_modalities: ${dataset.sensor_modalities}
  env_kwargs:
    control_mode: ${eval:'"ee" if ${eq:${action_key},action_ee} else "joint"'}
    # ── Domain randomization (convenience switches) ──
    # texture_random: when true, enables scene texture + per-episode skybox +
    #   light randomization + object texture + camera pose perturbation.
    #   Does NOT enable crazy_light (per-step color flashing).
    texture_random: false
    # instance_random: when true, enables model_id randomization.
    instance_random: true
    # table_random: when true, enables table height randomization
    #   (randomize_table_height with range [-0.05, 0.05]).
    table_random: true

# ── Eval ──
eval:
  seed: 0
  offline:
    ckpt_tag_or_path: best
    eval_episodes: 100
    denoise_timesteps_list: [10]
    use_ema_for_eval: true

# ── Hydra ──
hydra:
  job:
    override_dirname: ${policy_name}_${task_name}
  run:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
  sweep:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
    subdir: ${hydra.job.num}
