# @package _global_
# R3D — DDP multi-GPU training overlay
# Usage: bash scripts/train_ddp.sh ddp/r3d
#
# Effective batch size: per_gpu_batch × num_gpus × gradient_accumulation_steps
#   train: 16 × 4 × 1 = 64  (vs single-GPU 32; DDP 2× larger to match DP3 effective batch)
#   val:   16 × 4 × 1 = 64  (vs single-GPU 8)

defaults:
  - /r3d
  - _self_

policy_name: ddp/r3d

training:
  num_gpus: 4
  gpu_ids: null

dataloader:
  batch_size: 16
  num_workers: 4               # per-GPU cap for DDP (parent r3d has 8)

val_dataloader:
  batch_size: 16
  num_workers: 2               # per-GPU cap for DDP

hydra:
  job:
    override_dirname: ${policy_name}_${task_name}
  run:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
  sweep:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
    subdir: ${hydra.job.num}
