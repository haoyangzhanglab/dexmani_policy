# MultiTask DiT — Multi-task policy with text-conditioned DiT backbone
# Encoder:  CLIP ViT-B/16 text encoder (frozen) + R3M ResNet-18 vision backbone
# Decoder:  DiT Diffusion (self-attention + AdaLN conditioning)
# Modality: RGB + joint_state + task_text → action
# Tasks:    pick_bottle, open_box

policy_name: multitask_dit

# ── Tasks ──
task_name: pick_bottle+open_box
seed: 42

# ── Core ──
horizon: 16
n_obs_steps: 2
n_action_steps: 8
action_key: action                    # action | action_ee
action_dim: ${eval:'21 if ${eq:${action_key},action_ee} else 19'}

# ── Dataloader ──
dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: false

val_dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  drop_last: false

# ── Dataset ──
dataset:
  _target_: dexmani_policy.datasets.multi_task_dataset.MultiTaskDataset
  seed: ${training.seed}
  sampling_strategy: balanced          # proportional | balanced | weighted
  normalizer_mode: shared              # shared | per_task
  action_key: ${action_key}

  # Joint-state augmentation — mild Gaussian noise, 50% trigger rate.
  augmentation_cfg:
    state:
      noise:       {noise_std: 0.005, prob: 0.5}

  task_names:
    - pick_bottle
    - open_box

  task_texts:
    - "pick up the bottle"
    - "open the box"

  datasets:
    - _target_: dexmani_policy.datasets.rgb_dataset.RGBDataset
      action_key: ${action_key}
      zarr_path: robot_data/pick_bottle.zarr
      seed: ${seed}
      horizon: ${horizon}
      pad_before: ${eval:'${n_obs_steps} - 1'}
      pad_after: ${eval:'${n_action_steps} - 1'}
      val_ratio: 0.05
      max_train_episodes: null
      sensor_modalities: ['joint_state', 'rgb']
      obs_horizon: ${n_obs_steps}
      rgb_preprocess_size: [240, 240]
      rgb_random_crop_size: [224, 224]
      rgb_aug:
        _target_: dexmani_policy.datasets.augmentation.ImageAug
        brightness: 0.3
        contrast: 0.2
        saturation: 0.2
        hue: 0.05
        grayscale_prob: 0.1
        noise_std: 0.0
        blur_prob: 0.0
        prob: 0.25

    - _target_: dexmani_policy.datasets.rgb_dataset.RGBDataset
      action_key: ${action_key}
      zarr_path: robot_data/open_box.zarr
      seed: ${seed}
      horizon: ${horizon}
      pad_before: ${eval:'${n_obs_steps} - 1'}
      pad_after: ${eval:'${n_action_steps} - 1'}
      val_ratio: 0.05
      max_train_episodes: null
      sensor_modalities: ['joint_state', 'rgb']
      obs_horizon: ${n_obs_steps}
      rgb_preprocess_size: [240, 240]
      rgb_random_crop_size: [224, 224]
      rgb_aug:
        _target_: dexmani_policy.datasets.augmentation.ImageAug
        brightness: 0.3
        contrast: 0.2
        saturation: 0.2
        hue: 0.05
        grayscale_prob: 0.1
        noise_std: 0.0
        blur_prob: 0.0
        prob: 0.25

# ── Agent ──
agent:
  _target_: dexmani_policy.agents.core.multi_task.MultiTaskAgent
  text_encoder_model: openai/clip-vit-base-patch16
  task_texts: ${dataset.task_texts}
  rgb_backbone_name: r3m
  rgb_backbone_config:
    model_name: resnet18          # resnet18(512d) | resnet34(512d) | resnet50(2048d)
    tune_mode: full               # freeze | full
    norm_mode: group_norm         # R3M BN stats (Ego4D) discarded; GN = EMA-safe
    image_size: [224, 224]
    crop_ratio: 0.95
  # rgb_backbone_name: resnet
  # rgb_backbone_config:
  #   model_name: resnet18
  #   weights: null               # null=scratch: GN replaces BN (RoboTwin DP: "EMA destroys performance with BN")
  #   tune_mode: full
  #   norm_mode: group_norm
  #   image_size: [224, 224]
  #   crop_ratio: 0.95
  # rgb_backbone_name: dino
  # rgb_backbone_config:
  #   model_name: small          # facebook/dinov2-small, 384d
  #   tune_mode: lora
  #   global_token_type: avg
  #   image_size: [224, 224]
  #   crop_ratio: 0.95
  state_dim: 19
  state_out_dim: 64

  # DiT backbone
  n_emb: 512
  num_heads: 8
  n_layers: 8
  mlp_ratio: 4.0
  qkv_bias: true

  action_decoder_type: diffusion     # diffusion | flowmatch

  # Diffusion
  num_training_steps: 100
  num_inference_steps: 10
  prediction_type: sample

  # FlowMatch (only active when action_decoder_type=flowmatch)
  flow_num_inference_steps: 10
  flow_t_sample_mode: beta
  flow_beta_alpha: 1.0
  flow_beta_beta: 1.5

  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  action_dim: ${action_dim}
  modality_dropout_probs:
    joint_state: 0.0

optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-6
  betas: [0.95, 0.999]
  obs_lr: 1.0e-4
  obs_weight_decay: 1.0e-6

ema:
  _target_: dexmani_policy.training.common.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

workspace:
  _target_: dexmani_policy.training.common.workspace.TrainWorkspace
  output_dir: ${hydra:runtime.output_dir}

  wandb_cfg:
    _target_: dexmani_policy.training.common.workspace.WandbConfig
    project: dexmani_policy
    group: ${policy_name}
    name: ${task_name}_${now:%Y-%m-%d_%H-%M}_${training.seed}
    id: ${policy_name}_${task_name}_${training.seed}
    resume: allow
    mode: offline
    video_fps: ${env_runner.env_video_fps}

  checkpoint_cfg:
    _target_: dexmani_policy.training.common.workspace.CheckpointConfig
    monitor_key: test_mean_score
    mode: max
    topk: 3

# ── Training ──
training:
  seed: ${seed}
  device: cuda:0
  use_bfloat16: true
  use_compile: true
  use_ema: true
  use_ema_teacher_for_consistency: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_grad_norm: 1.0
  loop:
    num_epochs: 1000
    log_interval_steps: 50
    val_interval_epochs: 25
    eval_interval_epochs: 250
    sample_interval_epochs: 5
    gradient_accumulation_steps: 1


env_runner:
  _target_: dexmani_policy.env_runner.multi_task_sim_runner.MultiTaskSimRunner
  n_obs_steps: ${n_obs_steps}
  env_video_fps: 15
  default_eval_episodes: 20
  sensor_modalities: ['joint_state', 'rgb']
  task_configs:
    - task_name: pick_bottle
      task_text: ${dataset.task_texts[0]}
      env_kwargs:
        control_mode: ${eval:'"ee" if ${eq:${action_key},action_ee} else "joint"'}
    - task_name: open_box
      task_text: ${dataset.task_texts[1]}
      env_kwargs:
        control_mode: ${eval:'"ee" if ${eq:${action_key},action_ee} else "joint"'}

eval:
  seed: 0
  offline:
    ckpt_tag_or_path: best
    eval_episodes: 100
    denoise_timesteps_list: [10]
    use_ema_for_eval: true

hydra:
  job:
    override_dirname: ${policy_name}_${task_name}
  run:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
  sweep:
    dir: experiments/${policy_name}/${task_name}/${now:%Y-%m-%d_%H-%M}_${training.seed}
    subdir: ${hydra.job.num}
